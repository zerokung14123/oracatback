[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/google-oauth"
  to = "/.netlify/functions/google-oauth"
  status = 200

[[redirects]]
  from = "/api/public-config"
  to = "/.netlify/functions/public-config"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
