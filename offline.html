<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0D1117" />
  <title>ออฟไลน์ | Oracat Manager</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/oracat-icon-192.png" />
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #f5f7fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 28% 18%, rgba(240, 138, 36, 0.16), transparent 30%),
        #0d1117;
    }

    main {
      width: min(100%, 440px);
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(16, 24, 32, 0.94);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    img {
      width: min(100%, 240px);
      height: auto;
      margin: 0 0 18px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.45rem;
      line-height: 1.25;
    }

    p {
      margin: 0 0 20px;
      color: #cfd6e4;
      line-height: 1.65;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 6px;
      background: #f08a24;
      color: #111820;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <img src="/assets/brand/oracat-logo.png" alt="Oracat Manager" />
    <h1>ยังไม่มีการเชื่อมต่ออินเทอร์เน็ต</h1>
    <p>Oracat Manager โหลดหน้าแอปพื้นฐานไว้แล้ว แต่การเข้าสู่ระบบ ซิงก์ Firebase และ Google API ต้องใช้อินเทอร์เน็ต กรุณาเชื่อมต่อแล้วลองใหม่อีกครั้ง</p>
    <a href="/index.html">กลับไปหน้าแอป</a>
  </main>
</body>
</html>
